services:
  livekit:
    image: livekit/livekit-server:v1.9
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"      # WebSocket / HTTP API
      - "7881:7881"      # TCP fallback (ICE/TCP)
      - "7882:7882/udp"  # RTC/UDP (single-port mode for dev)
      - "6789:6789"      # Prometheus 자체 메트릭 (Phase 5)
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 모드 B(HLS) — Room Composite → HLS 세그먼트를 ./egress-out 에 출력.
  # 베스트 에포트: headless Chrome 기반이라 Mac Docker 에서 무겁고 불안정할 수 있음.
  # 실패해도 서버가 모드 A(webrtc)로 자동 폴백하므로 인프라 필수 요소는 아님.
  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
      - ./egress-out:/out
    cap_add:
      - SYS_ADMIN
    depends_on:
      - redis
      - livekit

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: multilive
      POSTGRES_PASSWORD: multilive
      POSTGRES_DB: multilive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multilive"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
